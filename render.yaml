services:
  # Type of service (web, worker, or private)
  - type: web
    # Name of your service
    name: quantity-measurement-api
    # Runtime environment (docker)
    runtime: docker
    # Docker context and Dockerfile location
    dockerContext: .
    dockerfilePath: ./Dockerfile
    # Environment variables
    env:
      # Database connection (using DATABASE_URL for simplicity)
      - key: DATABASE_URL
        fromDatabase:
          name: quantity-measurement-db
          property: connectionString
      # Redis connection (use Redis Cloud add-on or external service)
      - key: Redis__ConnectionString
        value: ""
      # JWT Configuration
      - key: Jwt__Issuer
        value: QuantityMeasurementAPI
      - key: Jwt__Audience
        value: QuantityMeasurementClient
      - key: Jwt__Key
        generateValue: true
      # ASP.NET Core configuration
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
    # Health check path
    healthCheckPath: /api/health
    # Port your application listens on
    port: 8080
    # Auto-deploy on git push
    autoDeploy: true
    # Plan (free, starter, standard)
    plan: free

databases:
  # PostgreSQL database for the application
  - name: quantity-measurement-db
    databaseName: quantitymeasurementdb
    user: quantitymeasurement_user
    plan: free
