services:

  # Redis Cache Service
  - type: pserv
    name: quantitymeasurement-redis
    env: docker
    dockerfilePath: ./Dockerfile.redis
    dockerContext: .
    plan: free
    envVars:
      - key: REDIS_PASSWORD
        generateValue: true

  # Web API Service
  - type: web
    name: quantitymeasurement-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:80
      - key: ConnectionStrings__DefaultConnection
        value: postgresql://quantity_measurement_db_zl98_user:uDtWauL3ZY25yRk3GxXTE4cFXQJ1dRE2@dpg-d7gsescvikkc7380mlog-a/quantity_measurement_db_zl98
      - key: ConnectionStrings__Redis
        value: redis:${quantitymeasurement-redis.internalHost}:6379,password=${quantitymeasurement-redis.env.REDIS_PASSWORD}
      - key: JwtSettings__Key
        generateValue: true
      - key: EncryptionSettings__Key
        generateValue: true
