version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: quantity-measurement-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - quantity-measurement-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Passw0rd", "-Q", "SELECT 1", "-b", "-o", "/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: quantity-measurement-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - quantity-measurement-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # .NET Web API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantity-measurement-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=QuantityMeasurementDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - Redis__ConnectionString=redis:6379
      - Jwt__Issuer=QuantityMeasurementAPI
      - Jwt__Audience=QuantityMeasurementClient
      - Jwt__Key=YourSuperSecretKeyForJWTTokenGenerationThatIsAtLeast32CharactersLong!
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantity-measurement-network
    restart: unless-stopped

volumes:
  sqlserver-data:
    driver: local
  redis-data:
    driver: local

networks:
  quantity-measurement-network:
    driver: bridge
